<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallpapers Just Mii</title>
  <link rel="icon" type="image/png" href="images/just_mii_NERV.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --faint: #444;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.28s ease, transform 0.28s ease;
    }
    body.page-ready { opacity: 1; transform: none; }
    body.page-exit { opacity: 0; transform: translateY(8px); }

    nav {
      padding: 1.5rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(10px);
    }
    .nav-logo {
      font-size: 0.85rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text); text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a {
      font-size: 0.72rem; font-weight: 400;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--muted); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .page-header {
      padding: 2.5rem 2.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .page-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    #wp-count {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar {
      padding: 1rem 2.5rem;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      gap: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .search-input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      outline: none;
      border-radius: 2px;
    }
    .search-input:focus { border-color: #555; }
    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      min-width: 176px;
    }
    .view-btn {
      flex: 1;
      padding: 0.65rem 0.9rem;
      background: none;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .view-btn:last-child { border-right: none; }
    .view-btn.active { background: var(--text); color: var(--bg); }

    .filters {
      padding: 1.25rem 2.5rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 2px;
    }
    .filter-btn:hover { border-color: #555; color: var(--text); }
    .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .gallery { padding: 2rem 2.5rem; }
    .category-section {
      margin-bottom: 2.5rem;
      animation: fadeUp 0.35s ease both;
    }
    .category-section:last-child { margin-bottom: 0; }
    .category-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.9rem;
    }
    .category-heading h2 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .category-heading span {
      font-size: 0.6rem;
      color: var(--faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 0.75rem;
    }
    .category-section.collection-single .gallery-grid {
      grid-template-columns: 1fr;
    }
    .gallery.compact .gallery-grid {
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    }

    .wp-card {
      position: relative;
      aspect-ratio: 16/10;
      overflow: hidden;
      background: var(--surface);
      cursor: pointer;
      border: 1px solid var(--border);
      animation: fadeUp 0.35s ease both;
    }
    .collection-single .wp-card {
      aspect-ratio: 21/9;
      min-height: 320px;
    }
    .wp-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .wp-card:hover img { transform: scale(1.04); }

    .wp-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.15) 55%, transparent 100%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 1.25rem;
    }
    .wp-card:hover .wp-overlay { opacity: 1; }

    .wp-info { width: 100%; display: flex; align-items: flex-end; justify-content: space-between; gap: 0.75rem; }
    .wp-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
    }
    .wp-tag {
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-top: 0.2rem;
    }
    .wp-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .variant-strip {
      position: absolute;
      left: 1.25rem;
      right: 1.25rem;
      top: 1.25rem;
      display: flex;
      gap: 0.45rem;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .wp-card:hover .variant-strip { opacity: 1; transform: none; }
    .variant-thumb {
      width: 54px;
      aspect-ratio: 16/10;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.25);
      background: #111;
    }
    .variant-more {
      min-width: 54px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.08em;
    }
    .wp-dl-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.45rem 0.65rem;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .wp-dl-btn:hover { background: rgba(255,255,255,0.2); }

    .empty-state {
      padding: 5rem 2rem;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .lightbox {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.93);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .lightbox.open { display: flex; animation: fadeIn 0.22s ease both; }
    .lb-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 92vw;
      max-height: 92vh;
      animation: scaleIn 0.24s ease both;
    }
    .lb-img {
      max-width: 100%;
      max-height: 72vh;
      object-fit: contain;
      display: block;
    }
    .lb-bar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 1rem;
    }
    .lb-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
    }
    .lb-meta {
      margin-top: 0.3rem;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .lb-variants {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 0.8rem;
    }
    .lb-actions { display: flex; gap: 0.75rem; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
    .lb-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.5rem 1.1rem;
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .lb-btn:hover, .lb-btn.active { background: rgba(255,255,255,0.12); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 1.5rem;
      transform: translateX(-50%);
      z-index: 500;
      display: none;
      padding: 0.7rem 1.2rem;
      border: 1px solid var(--border);
      background: #181818;
      color: var(--text);
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .toast.show { display: block; animation: fadeUp 0.2s ease both; }

    footer {
      padding: 1.5rem 2.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
    }
    footer span {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--faint);
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.985); }
      to { opacity: 1; transform: none; }
    }

    @media (max-width: 720px) {
      .toolbar { grid-template-columns: 1fr; }
      .view-toggle { min-width: 0; }
      .lb-bar { grid-template-columns: 1fr; }
      .lb-actions { justify-content: flex-start; }
    }

    @media (max-width: 600px) {
      nav, .page-header, .filters, .toolbar { padding-left: 1.25rem; padding-right: 1.25rem; }
      .page-header { align-items: flex-start; flex-direction: column; }
      .gallery { padding: 1.25rem; }
      .gallery-grid { gap: 0.5rem; grid-template-columns: 1fr; }
      .gallery.compact .gallery-grid { grid-template-columns: 1fr 1fr; }
      .collection-single .wp-card { aspect-ratio: 16/12; min-height: 0; }
      .category-heading { align-items: flex-start; flex-direction: column; gap: 0.25rem; }
      .wp-overlay { opacity: 1; padding: 0.9rem; }
      .wp-info { align-items: flex-start; flex-direction: column; }
      .variant-strip { display: none; }
      footer { padding: 1.25rem; flex-direction: column; gap: 0.4rem; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Just Mii</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="wallpapers.html" class="active">Wallpapers</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>Wallpapers</h1>
    <span id="wp-count">Loading...</span>
  </div>

  <div class="toolbar">
    <input class="search-input" id="search" type="search" placeholder="Search title, tag, category..." autocomplete="off" />
    <div class="view-toggle" aria-label="Gallery view">
      <button class="view-btn active" data-view="large">Large</button>
      <button class="view-btn" data-view="compact">Compact</button>
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-type="all" data-value="all">All</button>
  </div>

  <div class="gallery" id="gallery"></div>

  <div class="lightbox" id="lightbox">
    <div class="lb-inner">
      <img class="lb-img" id="lb-img" src="" alt="" />
      <div class="lb-bar">
        <div>
          <p class="lb-title" id="lb-title"></p>
          <p class="lb-meta" id="lb-meta"></p>
          <div class="lb-variants" id="lb-variants"></div>
        </div>
        <div class="lb-actions">
          <button class="lb-btn" id="lb-copy-image">Copy Image</button>
          <button class="lb-btn" id="lb-copy-page">Copy Link</button>
          <a class="lb-btn" id="lb-dl" download>Download</a>
          <button class="lb-btn" id="lb-close">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <footer>
    <span>© <span id="yr"></span> Just Mii</span>
    <span>All rights reserved</span>
  </footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
    requestAnimationFrame(() => document.body.classList.add('page-ready'));

    let all = [], categories = [], activeFilter = { type:'all', value:'all' };
    let activeQuery = '', activeView = 'large', currentWallpaper = null, currentVariantIndex = 0;
    const DEFAULT_CATEGORY = 'Wallpapers';

    function esc(v='') {
      return String(v).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
    }

    function normalizeData(data) {
      const raw = Array.isArray(data) ? data : (data?.wallpapers || []);
      const wallpapers = raw.map(w => {
        const variants = normalizeVariants(w);
        return {
          ...w,
          url: variants[0]?.url || w.url || '',
          category: w.category || DEFAULT_CATEGORY,
          variants
        };
      });
      const baseCategories = Array.isArray(data) ? [DEFAULT_CATEGORY] : (data?.categories || []);
      return { categories: buildCategoryList(wallpapers, baseCategories), wallpapers };
    }

    function normalizeVariants(w) {
      const fromList = Array.isArray(w.variants)
        ? w.variants.filter(v => v?.url).map(v => ({ label:v.label || 'Variant', url:v.url }))
        : [];
      if (fromList.length) return fromList;
      return w.url ? [{ label:'Original', url:w.url }] : [];
    }

    function buildCategoryList(items, base=[]) {
      const names = [...base, ...items.map(w => w.category)].filter(Boolean);
      return [...new Set(names.length ? names : [DEFAULT_CATEGORY])];
    }

    function itemKey(w) {
      return w.id || w.url;
    }

    function primaryVariant(w) {
      return normalizeVariants(w)[0] || { label:'Original', url:w.url };
    }

    async function load() {
      try {
        const r = await fetch('wallpapers.json?t=' + Date.now());
        if (!r.ok) throw 0;
        const data = normalizeData(await r.json());
        all = data.wallpapers;
        categories = data.categories.filter(c => all.some(w => (w.category || DEFAULT_CATEGORY) === c));
        buildFilters();
        render();
        openFromUrl();
      } catch {
        document.getElementById('gallery').innerHTML = '<div class="empty-state">No wallpapers yet - check back soon.</div>';
        document.getElementById('wp-count').textContent = '0 items';
      }
    }

    function buildFilters() {
      const tags = [...new Set(all.flatMap(w => w.tags || []))];
      const filters = [
        { type:'all', value:'all', label:'All' },
        ...categories.map(c => ({ type:'category', value:c, label:c })),
        ...tags.map(t => ({ type:'tag', value:t, label:'#' + t }))
      ];
      const c = document.getElementById('filters');
      c.innerHTML = filters.map(f =>
        `<button class="filter-btn${f.type==='all'?' active':''}" data-type="${esc(f.type)}" data-value="${esc(f.value)}">${esc(f.label)}</button>`
      ).join('');
      c.addEventListener('click', e => {
        const b = e.target.closest('.filter-btn');
        if (!b) return;
        c.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        activeFilter = { type:b.dataset.type, value:b.dataset.value };
        render();
      });
    }

    function render() {
      const list = getVisibleWallpapers();
      document.getElementById('wp-count').textContent = `${list.length} collection${list.length!==1?'s':''}`;
      const g = document.getElementById('gallery');
      g.classList.toggle('compact', activeView === 'compact');
      if (!list.length) { g.innerHTML = '<div class="empty-state">Nothing matches this view.</div>'; return; }
      const groups = activeFilter.type === 'all'
        ? categories.map(c => ({ category:c, items:list.filter(w => (w.category||DEFAULT_CATEGORY) === c) })).filter(g => g.items.length)
        : [{ category:filterTitle(), items:list }];
      g.innerHTML = groups.map(group => `
        <section class="category-section${group.items.length===1?' collection-single':''}">
          <div class="category-heading">
            <h2>${esc(group.category)}</h2>
            <span>${group.items.length} collection${group.items.length!==1?'s':''}</span>
          </div>
          <div class="gallery-grid">
            ${group.items.map(w => cardTemplate(w)).join('')}
          </div>
        </section>`).join('');

      g.querySelectorAll('.wp-card').forEach(card => {
        card.addEventListener('click', e => {
          const action = e.target.closest('[data-action]');
          const w = all.find(item => itemKey(item) === card.dataset.id);
          if (!w) return;
          if (action?.dataset.action === 'download') { e.stopPropagation(); download(primaryVariant(w).url, w.title); return; }
          if (action?.dataset.action === 'copy') { e.stopPropagation(); copyText(pageLink(w), 'Link copied'); return; }
          openLb(w);
        });
      });
    }

    function getVisibleWallpapers() {
      const filtered = activeFilter.type === 'all'
        ? all
        : activeFilter.type === 'category'
          ? all.filter(w => (w.category||DEFAULT_CATEGORY) === activeFilter.value)
          : all.filter(w => (w.tags||[]).includes(activeFilter.value));
      if (!activeQuery) return filtered;
      return filtered.filter(w => searchText(w).includes(activeQuery));
    }

    function searchText(w) {
      return [w.title, w.description, w.category, ...(w.tags || []), ...normalizeVariants(w).map(v => v.label)].join(' ').toLowerCase();
    }

    function filterTitle() {
      if (activeFilter.type === 'category') return activeFilter.value;
      if (activeFilter.type === 'tag') return '#' + activeFilter.value;
      return 'All';
    }

    function cardTemplate(w) {
      const variants = normalizeVariants(w);
      const primary = variants[0] || primaryVariant(w);
      return `
        <div class="wp-card" data-id="${esc(itemKey(w))}">
          <img src="${esc(primary.url)}" alt="${esc(w.title)}" loading="lazy" />
          ${variantStrip(variants)}
          <div class="wp-overlay">
            <div class="wp-info">
              <div>
                <p class="wp-title">${esc(w.title)}</p>
                <p class="wp-tag">${esc(w.category || DEFAULT_CATEGORY)}${variants.length > 1 ? ` / ${variants.length} versions` : ''}</p>
                ${w.tags?.length ? `<p class="wp-tag">${w.tags.map(esc).join(' / ')}</p>` : ''}
              </div>
              <div class="wp-actions">
                <button class="wp-dl-btn" data-action="copy">Copy</button>
                <button class="wp-dl-btn" data-action="download">Download</button>
              </div>
            </div>
          </div>
        </div>`;
    }

    function variantStrip(variants) {
      if (variants.length < 2) return '';
      const thumbs = variants.slice(0, 5).map(v => `<img class="variant-thumb" src="${esc(v.url)}" alt="${esc(v.label)}" loading="lazy" />`).join('');
      const more = variants.length > 5 ? `<span class="variant-more">+${variants.length - 5}</span>` : '';
      return `<div class="variant-strip">${thumbs}${more}</div>`;
    }

    function openLb(w, variantIndex=0, push=true) {
      if (!w) return;
      currentWallpaper = w;
      currentVariantIndex = variantIndex;
      renderLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
      if (push) history.replaceState(null, '', pageLink(w, false));
    }

    function renderLightbox() {
      const w = currentWallpaper;
      const variants = normalizeVariants(w);
      const variant = variants[currentVariantIndex] || variants[0] || primaryVariant(w);
      document.getElementById('lb-img').src = variant.url;
      document.getElementById('lb-img').alt = `${w.title} - ${variant.label}`;
      document.getElementById('lb-title').textContent = w.title;
      document.getElementById('lb-meta').textContent = [w.category, variant.label, ...(w.tags || [])].filter(Boolean).join(' / ');
      const d = document.getElementById('lb-dl');
      d.href = variant.url; d.download = `${w.title} - ${variant.label}`;
      document.getElementById('lb-variants').innerHTML = variants.map((v,i) =>
        `<button class="lb-btn${i===currentVariantIndex?' active':''}" data-variant="${i}">${esc(v.label)}</button>`
      ).join('');
      document.querySelectorAll('[data-variant]').forEach(btn => {
        btn.addEventListener('click', () => {
          currentVariantIndex = +btn.dataset.variant;
          renderLightbox();
        });
      });
    }

    function closeLb() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
      currentWallpaper = null;
      if (new URL(location.href).searchParams.has('id')) history.replaceState(null, '', location.pathname);
    }

    function pageLink(w, absolute=true) {
      const url = new URL(location.href);
      url.search = '';
      url.searchParams.set('id', itemKey(w));
      return absolute ? url.toString() : `${url.pathname}${url.search}`;
    }

    function openFromUrl() {
      const id = new URL(location.href).searchParams.get('id');
      if (!id) return;
      openLb(all.find(w => itemKey(w) === id), 0, false);
    }

    function download(url, name) {
      const a = document.createElement('a');
      a.href = url; a.download = name;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    async function copyText(text, msg) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const t = document.createElement('textarea');
        t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); t.remove();
      }
      toast(msg);
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 1800);
    }

    document.getElementById('search').addEventListener('input', e => {
      activeQuery = e.target.value.trim().toLowerCase();
      render();
    });
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeView = btn.dataset.view;
        document.querySelectorAll('.view-btn').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });
    document.getElementById('lb-close').addEventListener('click', closeLb);
    document.getElementById('lb-copy-page').addEventListener('click', () => currentWallpaper && copyText(pageLink(currentWallpaper), 'Link copied'));
    document.getElementById('lb-copy-image').addEventListener('click', () => {
      const variant = normalizeVariants(currentWallpaper || {})[currentVariantIndex];
      if (variant) copyText(variant.url, 'Image link copied');
    });
    document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) closeLb(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });
    document.querySelectorAll('a[href$=".html"]').forEach(a => {
      a.addEventListener('click', e => {
        if (a.target || a.href === location.href) return;
        e.preventDefault();
        document.body.classList.add('page-exit');
        setTimeout(() => location.href = a.href, 180);
      });
    });

    load();
  </script>
</body>
</html>
