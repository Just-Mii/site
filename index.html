<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Just Mii</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --faint: #444;
      --accent: #f0f0f0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 1.5rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
    }
    .nav-links a {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .hero-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .hero-name {
      font-size: clamp(2.8rem, 8vw, 6rem);
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--text);
      margin-bottom: 1.25rem;
    }

    .hero-bio {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--muted);
      max-width: 380px;
      line-height: 1.7;
      margin-bottom: 4rem;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 520px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem 1.75rem;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.2s, background 0.2s;
      text-align: left;
    }
    .card:hover {
      border-color: #555;
      background: #1c1c1c;
    }
    .card-icon {
      font-size: 1.2rem;
      line-height: 1;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .card-desc {
      font-size: 0.7rem;
      color: var(--muted);
      line-height: 1.6;
      font-weight: 400;
    }
    .card-link {
      margin-top: auto;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--faint);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }
    .card:hover .card-link { color: var(--muted); }

    footer {
      padding: 1.5rem 2.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    footer span {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--faint);
      text-transform: uppercase;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s ease forwards;
    }
    .fade-in:nth-child(1) { animation-delay: 0.05s; }
    .fade-in:nth-child(2) { animation-delay: 0.15s; }
    .fade-in:nth-child(3) { animation-delay: 0.25s; }
    .fade-in:nth-child(4) { animation-delay: 0.35s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: none; }
    }

    @media (max-width: 500px) {
      nav { padding: 1.25rem 1.5rem; }
      .cards { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 0.4rem; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Just Mii</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="wallpapers.html">Wallpapers</a>
    </div>
  </nav>

  <main>
    <p class="hero-label fade-in">Digital Artist</p>
    <h1 class="hero-name fade-in">Just Mii</h1>
    <p class="hero-bio fade-in">
      I make wallpapers. Free to download, made with care.<br />
      Based somewhere on the internet.
    </p>

    <div class="cards fade-in">
      <a class="card" href="https://haunt.gg/NGE" target="_blank" rel="noopener">
        <span class="card-icon"></span>
        <p class="card-title">About me</p>
        <p class="card-desc">My full profile, socials and links on Haunt.gg</p>
        <span class="card-link">Haunt.gg</span>
      </a>

      <a class="card" href="wallpapers.html">
        <span class="card-icon"></span>
        <p class="card-title">Wallpapers</p>
        <p class="card-desc">Browse and download my collection</p>
        <span class="card-link">View gallery</span>
      </a>
    </div>
  </main>

  <footer>
    <span>© <span id="yr"></span> Just Mii</span>
    <span>All rights reserved</span>
  </footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>

</body>
</html>
